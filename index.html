<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Catur dengan Stockfish</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Simulasi Papan Catur dengan Stockfish</h1>
        <div class="controls">
            <label for="color-select">Pilih Warna:</label>
            <select id="color-select">
                <option value="white">Putih (Jalan Duluan)</option>
                <option value="black">Hitam (Musuh Jalan Duluan)</option>
            </select>
            <button id="start-btn">Mulai Permainan</button>
            <button id="reset-btn">Reset</button>
        </div>
        <div id="board" class="chessboard"></div>
        <div class="info">
            <p id="turn-info">Pilih warna dan klik Mulai</p>
            <p id="suggestion">Saran langkah: -</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
